version: '3.8'

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: msme_platform
      POSTGRES_USER: msme_user
      POSTGRES_PASSWORD: msme_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://msme_user:msme_pass@postgres:5432/msme_platform
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  worker:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://msme_user:msme_pass@postgres:5432/msme_platform
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: celery -A app.worker worker --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: npm run dev

volumes:
  postgres_data: